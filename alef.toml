    # Internal I/O and structure types
    "FileBytes",
    "InternedString",

    # Internal extraction result types missing Clone
    "PptExtractionResult",
    "DocExtractionResult",

    # Types with non-Clone/non-Default fields (Mutex, OpenTelemetry metrics)
    "TelemetryMetrics",
    "ExtractionMetrics",

    # Internal layout/detection types missing serde
    "PageLayoutRegion",
    "ListItemMetadata",

    # Plugin traits — cannot be bound across languages
    "Renderer",
    "OcrBackend",
    "Plugin",
    "PostProcessor",
    "Validator",

    # Internal docx/hwp parser types — missing Serialize/Deserialize derives
    "Table",     # kreuzberg::extraction::docx::parser::Table
    "TableCell", # kreuzberg::extraction::docx::parser::TableCell
    "TableRow",  # kreuzberg::extraction::docx::parser::TableRow
    "Section",   # kreuzberg::extraction::hwp::model::Section

    # Duplicate types with internal-only versions — use public types instead
    "BoundingBox",   # kreuzberg::pdf::hierarchy::bounding_box::BoundingBox (internal; use kreuzberg::types::BoundingBox)
    "ImageMetadata", # kreuzberg::extraction::image::ImageMetadata (internal; use kreuzberg::types::ImageMetadata)
    "Attributes",    # kreuzberg::extractors::djot_format::attributes::Attributes (internal type with lifetime issues)

    # Internal IDs and newtype wrappers lacking required derives/conversions
    "NodeId",    # String newtype without Serialize/From for FFI
    "ElementId", # String newtype without Serialize/From for FFI

    # Internal types from docx parser
    "DocumentElement", # kreuzberg::extraction::docx::parser::DocumentElement (internal; missing Default)

    # Dependency-owned types that cannot be converted for cross-language bindings
    "LayoutEngine",    # tch-rs Session wrapper — can't serialize
    "NormalizeResult", # ort output type — internal, can't serialize

    # Internal stats/response types
    "NativeTextStats",       # missing Debug
    "ErrorResponse",         # API-only error response
    "ApiSizeLimits",         # internal API config
    "PdfDocument",           # pdfium_render type — can't cross FFI
    "PdfExtractionMetadata", # internal PDF metadata

    "VlmOcrBackend",
    "ApiError",
    "Drawing",
    "TableProperties",
    "TableGrid",

    # MCP param types with serde_json::Value fields that can't map to String
    "BatchExtractFilesParams",
]
functions = [
    # Internal functions not part of public API
    "resolve_cache_dir",
    "detect_and_rotate",
    "ensure_initialized",
    "register_keyword_processor",
    "register_chunking_processor",
    "extract_bundled_pdfium",      # PDF binary extraction — internal utility, not user-facing

    # Plugin registration — requires trait objects that can't be bound
    "register_ocr_backend",
    "register_renderer",

    # Functions taking pdfium_render::PdfDocument — can't be passed from bindings
    "extract_text_and_metadata_from_pdf_document",
    "extract_text_from_pdf_document",

    # Internal utility
    "clear_font_cache",

    "with_rotation_opt",
    "derive_document_structure",
    "derive_extraction_result",
    "parse_drawing",
    "parse_table_properties",
    "parse_table_grid",
    "tsv_row_to_element",
    "extract_complete_djot_content",
    "extract_metadata_from_yaml",
    "calculate_page_range",

    # Functions returning opaque dependency types that can't cross FFI
    "build_session",
    "create_layout_engine",
    "normalize_image",
    "build_layout_engine",
    "create_engine",
    "take_or_create_engine",
    "return_engine",
    "get_default_cache_dir",

    # Functions taking opaque/internal types as params
    "run_pipeline",
    "serve_with_config_and_limits",
    "normalize_image_dpi",
    "extract_metadata_from_document",

    # Returns DefaultClient — opaque dependency type, can't convert to String
    "create_client",
]
methods = [
    "OcrElement.with_rotation_opt",
    "VlmOcrBackend.backend_type",
    "ApiError.validation",
    "ApiError.unprocessable",
    "ApiError.internal",
    "ApiError.bad_gateway",
    "ApiError.from",

    # Returns PathBuf — can't convert to String across FFI
    "PaddleOcrConfig.resolve_cache_dir",
    # Ambiguous type inference in generated From conversion
    "HtmlMetadata.from",
]

# ---------------------------------------------------------------------------
# Output directories
# ---------------------------------------------------------------------------

[output]
python = "crates/kreuzberg-py/src/"
node = "crates/kreuzberg-node/src/"
ruby = "packages/ruby/ext/kreuzberg_rb/src/"
php = "crates/kreuzberg-php/src/"
ffi = "crates/kreuzberg-ffi/src/"
go = "packages/go/"
elixir = "packages/elixir/native/kreuzberg_nif/src/"
wasm = "crates/kreuzberg-wasm/src/"
java = "packages/java/src/main/java/dev/kreuzberg/"
csharp = "packages/csharp/src/"
r = "packages/r/src/rust/src/"

# ---------------------------------------------------------------------------
# Language-specific configuration
# ---------------------------------------------------------------------------

[python]
module_name = "_kreuzberg"

[python.stubs]
output = "packages/python/kreuzberg/"

[node]
package_name = "kreuzberg"

[ffi]
prefix = "kreuzberg"
header_name = "kreuzberg.h"
lib_name = "kreuzberg_ffi"
visitor_callbacks = false

[go]
module = "github.com/kreuzberg-dev/kreuzberg/v4"
package_name = "kreuzberg"

[java]
package = "dev.kreuzberg"
ffi_style = "panama"

[csharp]
namespace = "Kreuzberg"

[ruby]
gem_name = "kreuzberg"

[elixir]
app_name = "kreuzberg"

[php]
extension_name = "kreuzberg"

[r]
package_name = "kreuzberg"

[wasm]
# All complex types already excluded globally; only WASM-specific overrides here
exclude_types = []
exclude_functions = []
# Everything except ort-dependent features (paddle-ocr, layout-detection, embeddings, auto-rotate)
features = [
    "pdf",
    "excel-wasm",
    "office",
    "hwp",
    "iwork",
    "email",
    "html",
    "xml",
    "archives",
    "language-detection",
    "chunking",
    "quality",
    "keywords",
    "mdx",
    "ocr-wasm",
    "tree-sitter-wasm",
    "liter-llm",
    "stopwords",
]

# ---------------------------------------------------------------------------
# DTO styles
# ---------------------------------------------------------------------------

[dto]
python = "dataclass"
python_output = "typed-dict"
node = "interface"
ruby = "struct"
php = "readonly-class"
elixir = "struct"
go = "struct"
java = "record"
csharp = "record"
r = "list"

# ---------------------------------------------------------------------------
# Scaffold metadata
# ---------------------------------------------------------------------------

[scaffold]
description = "High-performance document intelligence library"
license = "Elastic-2.0"
repository = "https://github.com/kreuzberg-dev/kreuzberg"
homepage = "https://kreuzberg.dev"
authors = ["Na'aman Hirschfeld <naaman@kreuzberg.dev>"]
keywords = ["document", "extraction", "pdf", "ocr", "text"]

# ---------------------------------------------------------------------------
# Generation control
# ---------------------------------------------------------------------------

[generate]
bindings = true
errors = true
configs = true
async_wrappers = true
type_conversions = true
package_metadata = true
public_api = true

[generate_overrides.wasm]
async_wrappers = false

# ---------------------------------------------------------------------------
# Version synchronization
# ---------------------------------------------------------------------------

[sync]
extra_paths = [
    "packages/python/kreuzberg/__init__.py",
    "packages/ruby/lib/kreuzberg/version.rb",
    "crates/kreuzberg-node/package.json",
    "crates/kreuzberg-node/npm/*/package.json",
    "packages/go/go.mod",
]

# ---------------------------------------------------------------------------
# Adapters — all currently excluded (reference excluded types)
# ---------------------------------------------------------------------------
# Adapters will be re-added as types are brought back into include list.

# ---------------------------------------------------------------------------
# Test commands
# ---------------------------------------------------------------------------

[test.python]
command = "task python:test"
e2e = "cd e2e/python && python3 -m pytest tests/ -q"

[test.node]
command = "npx vitest run --config packages/typescript/vitest.config.ts"
e2e = "cd e2e/typescript && npx vitest run"

[test.go]
command = "task go:test"
e2e = "cd e2e/go && go test ./... -count=1"

[test.ruby]
command = "task ruby:test"

[test.php]
command = "task php:test"

[test.java]
command = "task java:test"

[test.csharp]
command = "task csharp:test"

[test.elixir]
command = "task elixir:test"
e2e = "cd e2e/elixir && mix test"

[test.r]
command = "task r:test"
e2e = "cd e2e/r && Rscript -e \"devtools::load_all('../../packages/r'); testthat::set_max_fails(Inf); testthat::test_dir('tests')\""

[test.wasm]
e2e = "cd e2e/wasm && npm test"

[test.rust]
e2e = "cd e2e/rust && cargo test"

# ---------------------------------------------------------------------------
# Lint commands
# ---------------------------------------------------------------------------

[lint.python]
format = "ruff format packages/python/"
check = "ruff check packages/python/"
typecheck = "mypy packages/python/"

[lint.node]
format = "npx biome format --write packages/typescript/"
check = "npx biome check packages/typescript/"

[lint.ruby]
format = "bundle exec rubocop -a packages/ruby/"
check = "bundle exec rubocop packages/ruby/"

[lint.php]
format = "phpcbf packages/php/"
check = "phpstan analyse packages/php/"

[lint.go]
check = "cd packages/go && golangci-lint run"

# ---------------------------------------------------------------------------
# E2E test generation
# ---------------------------------------------------------------------------

[e2e]
fixtures = "fixtures"
output = "e2e"
languages = ["python", "rust", "node", "go", "ruby", "elixir", "wasm"]
fields_optional = ["content", "metadata.format"]

[e2e.call]
function = "extract_file"
module = "kreuzberg"
result_var = "result"
async = true
args = [
    { name = "path", field = "input.path", type = "string" },
    { name = "mime_type", field = "input.mime_type", type = "string", optional = true },
    { name = "config", field = "input.config", type = "json_object", optional = true },
]

[e2e.call.overrides.rust]
crate_name = "kreuzberg"
function = "extract_file"

[e2e.call.overrides.python]
module = "kreuzberg"
function = "extract_file"
options_type = "ExtractionConfig"

[e2e.call.overrides.node]
module = "kreuzberg"
function = "extractFile"
options_type = "ExtractionConfig"

[e2e.call.overrides.go]
module = "github.com/kreuzberg-dev/kreuzberg/v4"
function = "ExtractFile"
alias = "kreuzberg"
options_type = "ExtractionConfig"

[e2e.call.overrides.java]
class = "dev.kreuzberg.Kreuzberg"
function = "extractFile"
options_type = "ExtractionConfig"

[e2e.call.overrides.csharp]
class = "Kreuzberg"
function = "ExtractFile"
options_type = "ExtractionConfig"

[e2e.call.overrides.ruby]
options_type = "Kreuzberg::ExtractionConfig"

[e2e.call.overrides.elixir]
options_type = "ExtractionConfig"
handle_struct_type = "ExtractionConfig"

[e2e.call.overrides.wasm]
options_type = "JsExtractionConfig"

# Named call configs for multi-function testing

[e2e.calls.extract_bytes]
function = "extract_bytes"
module = "kreuzberg"
async = true
args = [
    { name = "data", field = "input.data", type = "bytes" },
    { name = "mime_type", field = "input.mime_type", type = "string" },
    { name = "config", field = "input.config", type = "json_object", optional = true },
]

[e2e.calls.extract_file_sync]
function = "extract_file_sync"
module = "kreuzberg"
async = false
args = [
    { name = "path", field = "input.path", type = "string" },
    { name = "mime_type", field = "input.mime_type", type = "string", optional = true },
    { name = "config", field = "input.config", type = "json_object", optional = true },
]

[e2e.calls.extract_bytes_sync]
function = "extract_bytes_sync"
module = "kreuzberg"
async = false
args = [
    { name = "data", field = "input.data", type = "bytes" },
    { name = "mime_type", field = "input.mime_type", type = "string" },
    { name = "config", field = "input.config", type = "json_object", optional = true },
]

[e2e.calls.embed]
function = "embed_texts"
module = "kreuzberg"
async = false
args = [
    { name = "texts", field = "input.texts", type = "json_object" },
    { name = "config", field = "input.config", type = "json_object", optional = true },
]

[e2e.calls.render_page]
function = "render_page"
module = "kreuzberg"
async = false
args = [
    { name = "path", field = "input.path", type = "string" },
    { name = "page", field = "input.page", type = "int" },
    { name = "config", field = "input.config", type = "json_object", optional = true },
]

# Package references for e2e tests

[e2e.packages.rust]
path = "../../crates/kreuzberg"

[e2e.packages.python]
name = "kreuzberg"
path = "../../packages/python"

[e2e.packages.node]
name = "kreuzberg"
path = "../../crates/kreuzberg-node"

[e2e.packages.go]
module = "github.com/kreuzberg-dev/kreuzberg/v4"
path = "../../packages/go"
version = "v0.0.0"

[e2e.packages.csharp]
name = "Kreuzberg"
path = "../../packages/csharp/Kreuzberg/Kreuzberg.csproj"

[e2e.format]
python = "ruff check --fix {dir} && ruff format {dir}"
go = "gofmt -w {dir}"
rust = "cargo fmt --manifest-path {dir}/Cargo.toml"

[e2e.fields]
"metadata.title" = "metadata.format"

[e2e.fields_c_types]
"extraction_result.metadata" = "Metadata"
