[package]
name = "kreuzberg-rb"
version = "4.8.5"
edition = "2024"
license = "Elastic-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
kreuzberg = { path = "../../../../crates/kreuzberg", features = ["full", "pdf", "ocr", "paddle-ocr", "layout-detection", "embeddings", "chunking", "keywords-yake", "keywords-rake", "language-detection", "html", "tree-sitter", "office", "email", "archives", "stopwords", "auto-rotate", "tokio-runtime", "api", "mcp", "liter-llm"] }
magnus = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_magnus = "0.11"
tokio = { version = "1", features = ["full"] }

[package.metadata.cargo-machete]
ignored = ["serde_json", "tokio", "serde-wasm-bindgen", "pyo3-async-runtimes", "serde_magnus", "wiremock"]
