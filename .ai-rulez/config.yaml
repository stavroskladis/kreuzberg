$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
description: Rust document intelligence library with polyglot bindings (Python/TypeScript/Ruby/Java/Go/Elixir/C#/PHP)
gitignore: true
name: Kreuzberg

# Include shared ai-rulez configuration from git repository
# local_override: when set and path exists, uses local copy instead of git (for development)
includes:
  - name: kreuzberg-core
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/core
    local_override: ../ai-rulez
    merge_strategy: local-override
  - name: kreuzberg-cicd
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/cicd
    local_override: ../ai-rulez
    merge_strategy: local-override
  - name: kreuzberg-infrastructure
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/infrastructure
    local_override: ../ai-rulez
    merge_strategy: local-override
  - name: kreuzberg-e2e-generator
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/e2e-generator
    local_override: ../ai-rulez
    merge_strategy: local-override

builtins:
  - rust
  - python
  - pyo3
  - typescript
  - napi-rs
  - go
  - java
  - ruby
  - magnus
  - php
  - ext-php-rs
  - csharp
  - elixir
  - rustler
  - wasm
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands

presets:
    - claude
    - gemini
    - codex

header:
  style: minimal

compression:
  level: moderate

version: "3.0"
